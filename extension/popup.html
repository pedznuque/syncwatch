<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SyncWatch</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>SyncWatch</h1>
      <p>The extension stays active and configures itself from the SyncWatch room you open.</p>
      <div class="connection"><span>Room</span><strong id="room">Waiting for SyncWatch</strong></div>
      <div class="connection"><span>Role</span><strong id="role">Automatic</strong></div>
      <div id="status">Open a SyncWatch room to begin.</div>
      <small>Stream windows open and change automatically. The host's detected video becomes the controller; viewers follow it.</small>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
