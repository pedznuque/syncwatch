<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncWatch Web Sync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header><strong>SyncWatch</strong><span>Web Video Sync</span></header>
    <label>Server URL<input id="serverUrl" type="url" /></label>
    <label>Room code<input id="roomId" autocomplete="off" /></label>
    <label>Mode
      <select id="role">
        <option value="controller">Controller — publish this video</option>
        <option value="viewer">Viewer — follow the controller</option>
      </select>
    </label>
    <label class="toggle"><input id="enabled" type="checkbox" /> Enable synchronization</label>
    <div class="actions"><button id="save">Save & connect</button><button id="open">Open synced video</button></div>
    <p id="status">Enter the same room code on both browsers.</p>
    <script src="popup.js"></script>
  </body>
</html>
